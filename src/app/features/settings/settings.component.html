<div id="settings-screen" class="screen active">
    <div class="container">
        <h2>{{ t('settingsTitle') }}</h2>
        <div class="settings-card">
            <div class="setting-item">
                <label for="timer-duration">{{ t('timerLabel') }}</label>
                <input type="number" id="timer-duration" min="3" max="20" [value]="timerDuration()"
                    (input)="setTimerDuration(($any($event.target)).value)">
            </div>

            <div class="setting-item">
                <label for="theme-toggle">{{ t('lightMode') }}</label>
                <label class="toggle">
                    <input type="checkbox" id="theme-toggle" [checked]="lightModeChecked()"
                        (change)="setLightMode(($any($event.target)).checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="btn btn-primary" (click)="saveSettings()">{{ t('save') }}</button>
        <div style="height: 1rem;"></div>
        <button class="btn btn-secondary" (click)="cancel.emit()">{{ t('cancel') }}</button>
    </div>
</div>
